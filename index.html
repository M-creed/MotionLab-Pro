<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MotionLab Pro</title>
<link rel="stylesheet" href="../style.css" ></linke>

</head>
<body>

<div class="nav">
  <div class="brand">
    <div class="brand-logo"> 
      <img src="./logo/motionlab.png" alt="MotionLab logo"/>
    </div>
    <div>
      <div class="brand-name">MotionLab Pro</div>
      <div class="brand-sub">kinematic analysis suite</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="dm-toggle" onclick="toggleDark()" title="Toggle dark/light mode">
      <span class="dm-icon sun">☀</span><span class="dm-knob" id="dm-knob"></span><span class="dm-icon moon">☾</span>
    </button>
    <button class="nbtn" onclick="clearAll()">clear</button>
    <button class="nbtn" onclick="importCSV()">import csv</button>
    <button class="nbtn" onclick="exportCSV()">export csv</button>
    <button class="nbtn accent" onclick="addRow()">+ row</button>
    <input type="file" id="csv-inp" accept=".csv" style="display:none" onchange="handleCSVFile(event)"/>
  </div>
</div>

<div class="body">
  <div class="left">
    <div class="sec-lbl">Manual input</div>
    <div id="pblist-manual"></div>
    <div class="sec-lbl">Auto-calculated</div>
    <div id="pblist-auto"></div>
  </div>
  <div class="right">
    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('data',this)">data entry</button>
        <button class="tab" onclick="switchTab('results',this)">results</button>
        <button class="tab" onclick="switchTab('charts',this)">graphs</button>
        <button class="tab" onclick="switchTab('formulas',this)">formulas</button>
        <button class="tab" onclick="switchTab('ccode',this)">C code</button>
      </div>
      <div class="divider"></div>
      <button class="nbtn" style="border-color:var(--purple);color:var(--purple)" onclick="loadSimulateData()">▶ simulate</button>
      <button class="nbtn" style="border-color:var(--amber);color:var(--amber)" onclick="switchTab('ccode',document.querySelector('.tab:nth-child(5)'));generateCCode()">{ } C code</button>
    </div>

    <div class="panel active" id="panel-data">
      <div class="stats-row" id="stats-row"></div>
      <div id="auto-info-box"></div>
      <div class="tbl-wrap">
        <div id="tbl-ct"></div>
        <div class="tbl-footer">
          <button class="tbl-foot-btn add" onclick="addRow()">+ add row</button>
          <button class="tbl-foot-btn del" onclick="deleteLastRow()">− delete row</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-results">
      <div style="display:flex;justify-content:flex-end;margin-bottom:9px">
        <button class="nbtn" onclick="openSaveResults()">↓ save results</button>
      </div>
      <div id="results-ct"></div>
    </div>

    <div class="panel" id="panel-charts">
      <div style="display:flex;justify-content:flex-end;margin-bottom:9px">
        <button class="nbtn" onclick="openSaveCharts()">↓ save graphs</button>
      </div>
      <div id="charts-ct"></div>
    </div>

    <div class="panel" id="panel-formulas">
      <div id="formulas-ct"></div>
    </div>

    <div class="panel" id="panel-ccode">
      <div id="ccode-ct"></div>
    </div>
  </div>
</div>

<!-- SAVE RESULTS MODAL -->
<div class="modal-bg" id="modal-results">
  <div class="modal">
    <div class="modal-title">Save Results</div>
    <div class="modal-row">
      <div class="modal-lbl">Format</div>
      <select class="modal-select" id="res-format">
        <option value="png">PNG image</option>
        <option value="pdf">PDF document</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal('modal-results')">cancel</button>
      <button class="modal-btn primary" onclick="saveResults()">save</button>
    </div>
  </div>
</div>

<!-- SAVE CHARTS MODAL -->
<div class="modal-bg" id="modal-charts">
  <div class="modal">
    <div class="modal-title">Save Graphs</div>
    <div class="modal-row">
      <div class="modal-lbl">Select charts</div>
      <div class="modal-chart-list" id="modal-chart-list"></div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Format</div>
      <select class="modal-select" id="chart-format">
        <option value="png">PNG image</option>
        <option value="pdf">PDF document</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal('modal-charts')">cancel</button>
      <button class="modal-btn primary" onclick="saveCharts()">save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../main.js"></script>
</body>
</html>
